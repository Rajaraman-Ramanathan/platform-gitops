apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bootstrap
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: minio-bootstrap
          image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
          command:
            - /bin/bash
            - /scripts/init-minio.sh
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: rootPassword
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: mc-config
              mountPath: /.mc
      volumes:
        - name: script
          configMap:
            name: minio-init-script
            defaultMode: 0755
        - name: mc-config
          emptyDir: {}