redis:
  serviceAccount:
    create: true
    name: redis-sa
    
  architecture: standalone

  auth:
    enabled: true
    password: devpassword

  master:
    persistence:
      enabled: false
    podLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/component: cache
      app.kubernetes.io/part-of: microbank
      app.kubernetes.io/managed-by: argocd
      network-role: platform
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
    containerSecurityContext:
      enabled: true
      runAsNonRoot: true
      allowPrivilegeEscalation: false
    startupProbe:
      enabled: true
      initialDelaySeconds: 20
      timeoutSeconds: 5
      failureThreshold: 30
      periodSeconds: 10
    livenessProbe:
      enabled: true
      initialDelaySeconds: 30
      timeoutSeconds: 5
      failureThreshold: 10
      periodSeconds: 10
    readinessProbe:
      enabled: true
      initialDelaySeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      periodSeconds: 10

  service:
    type: ClusterIP

  networkPolicy:
    enabled: false

  metrics:
    enabled: true