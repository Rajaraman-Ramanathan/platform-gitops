apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
data:
  bootstrap.sh: |
    #!/bin/bash
    set -euxo pipefail

    HOST="postgres-postgresql.postgres.svc.cluster.local"
    USER="postgres"

    export PGPASSWORD="$POSTGRES_PASSWORD"

    echo "Waiting for Postgres..."

    MAX_WAIT=120
    WAITED=0
    
    # checking network readiness
    until pg_isready -h "$HOST" -U "$USER"; do
      sleep 2
      WAITED=$((WAITED+2))
      if [[ $WAITED -ge $MAX_WAIT ]]; then
        echo "Timeout waiting for pg_isready"
        exit 1
      fi
    done

    WAITED=0

    # checking DB readiness
    until (psql -h "$HOST" -U "$USER" -d postgres -c "SELECT 1" >/dev/null 2>&1); do
      sleep 2
      WAITED=$((WAITED+2))
      if [[ $WAITED -ge $MAX_WAIT ]]; then
        echo "Timeout waiting for DB readiness"
        exit 1
      fi
    done

    echo "Postgres ready"

    # ------------------------
    # ROLE CREATION
    # ------------------------
    create_role() {
      local role=$1
      local pass=$2

      EXISTS=$(psql -h "$HOST" -U "$USER" -d postgres -tAc \
        "SELECT 1 FROM pg_roles WHERE rolname='${role}'")

      if [[ "$EXISTS" != "1" ]]; then
        echo "Creating role: $role"
        psql -h "$HOST" -U "$USER" -d postgres -c \
          "CREATE ROLE ${role} LOGIN PASSWORD '${pass}'"
      else
        echo "Role exists: $role"
      fi
    }

    # ------------------------
    # DB CREATION
    # ------------------------
    create_db() {
      local db=$1
      local owner=$2

      EXISTS=$(psql -h "$HOST" -U "$USER" -d postgres -tAc \
        "SELECT 1 FROM pg_database WHERE datname='${db}'")

      if [[ "$EXISTS" != "1" ]]; then
        echo "Creating DB: $db"
        psql -h "$HOST" -U "$USER" -d postgres -c \
          "CREATE DATABASE ${db} OWNER ${owner}"
      else
        echo "DB exists: $db"
      fi
    }

    # ------------------------
    # EXECUTION
    # ------------------------
    create_role accountuser accountpass
    create_role authuser authpass
    create_role transactionuser transactionpass
    create_role documentuser documentpass
    create_role keycloakuser keycloakpass

    create_db accountdb accountuser
    create_db authdb authuser
    create_db transactiondb transactionuser
    create_db documentdb documentuser
    create_db keycloakdb keycloakuser

    echo "Bootstrap completed"