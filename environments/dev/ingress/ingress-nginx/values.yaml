ingress-nginx:
  controller:
    replicaCount: 1

    ingressClassResource:
      name: nginx
      enabled: true
      default: true

    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing

    admissionWebhooks:
      enabled: true

    metrics:
      enabled: true

  defaultBackend:
    enabled: true