apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
spec:
  limits:
    - type: Container

      default:
        cpu: 500m
        memory: 1Gi

      defaultRequest:
        cpu: 250m
        memory: 512Mi

      max:
        cpu: "4"
        memory: 8Gi

      min:
        cpu: 50m
        memory: 128Mi