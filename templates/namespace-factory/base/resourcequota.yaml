apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi

    limits.cpu: "40"
    limits.memory: 80Gi

    persistentvolumeclaims: "20"

    services: "50"
    services.loadbalancers: "2"

    secrets: "200"
    configmaps: "200"

    pods: "100"