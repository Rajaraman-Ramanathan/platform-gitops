name: Reusable Security Scan Workflow

on:
  workflow_call:
    inputs:
      runtime:
        description: Runtime type
        required: true
        type: string
      language:
        description: CodeQL language
        required: true
        type: string
      fail-on-critical:
        description: Fail pipeline on critical vulnerabilities
        type: boolean
        default: true
      fail-on-high:
        description: Fail pipeline on high vulnerabilities
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate Runtime
        run: |
          case "${{ inputs.runtime }}" in
            springboot|nodejs|python)
              echo "Valid runtime"
              ;;
            *)
              echo "Unsupported runtime: ${{ inputs.runtime }}"
              exit 1
              ;;
          esac

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  dependency-submission:
    name: Dependency Submission
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        if: inputs.runtime == 'springboot'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Maven Dependency Submission
        if: inputs.runtime == 'springboot'
        uses: advanced-security/maven-dependency-submission-action@v4

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.24.2
          curl -sSL \
            https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/

  - name: Run Gitleaks
    run: |
      gitleaks detect \
        --source . \
        --report-format sarif \
        --report-path gitleaks.sarif

  - name: Upload Gitleaks SARIF
    uses: github/codeql-action/upload-sarif@v3
    with:
      sarif_file: gitleaks.sarif

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Determine Severity Policy
        id: severity
        run: |
          if [[ "${{ inputs.fail-on-high }}" == "true" ]]; then
            echo "severity=CRITICAL,HIGH" >> $GITHUB_OUTPUT
          elif [[ "${{ inputs.fail-on-critical }}" == "true" ]]; then
            echo "severity=CRITICAL" >> $GITHUB_OUTPUT
          else
            echo "severity=UNKNOWN" >> $GITHUB_OUTPUT
          fi

      - name: Generate Trivy SARIF
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Enforce Vulnerability Policy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          format: table
          exit-code: 1
          severity: ${{ steps.severity.outputs.severity }}

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
