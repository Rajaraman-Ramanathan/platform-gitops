apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-bootstrap
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: bootstrap
          image: bitnami/postgresql:latest
          command: ["/bin/bash", "/scripts/bootstrap.sh"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-postgresql
                  key: postgres-password
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: script
              mountPath: /scripts
      volumes:
        - name: tmp
          emptyDir: {}
        - name: script
          configMap:
            name: postgres-init-script
            defaultMode: 0755