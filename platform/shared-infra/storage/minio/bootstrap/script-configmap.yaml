apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-init-script
data:
  init-minio.sh: |
    #!/usr/bin/env bash

    set -Eeuxo pipefail

    readonly MINIO_ALIAS="microbank"
    readonly MINIO_ENDPOINT="http://minio:9000"
    readonly BUCKET_NAME="transaction-documents"

    log() {
      echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] $*"
    }

    wait_for_minio() {
      local retries=60
      local attempt=1
      log "Waiting for MinIO availability..."
      until mc alias set \
        "${MINIO_ALIAS}" \
        "${MINIO_ENDPOINT}" \
        "${MINIO_ROOT_USER}" \
        "${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1
      do
        if [[ ${attempt} -ge ${retries} ]]; then
          log "ERROR: MinIO unavailable after ${retries} attempts"
          exit 1
        fi
        log "MinIO not ready yet... attempt=${attempt}/${retries}"
        attempt=$((attempt + 1))
        sleep 5
      done

      log "MinIO connection established"
    }

    create_bucket() {
      if mc ls "${MINIO_ALIAS}/${BUCKET_NAME}" >/dev/null 2>&1; then
        log "Bucket already exists | bucket=${BUCKET_NAME}"
      else
        log "Creating bucket | bucket=${BUCKET_NAME}"
        mc mb "${MINIO_ALIAS}/${BUCKET_NAME}"
        log "Bucket created successfully | bucket=${BUCKET_NAME}"
      fi
    }

    apply_bucket_policy() {
      log "Applying private bucket policy | bucket=${BUCKET_NAME}"
      mc anonymous set none "${MINIO_ALIAS}/${BUCKET_NAME}"
      log "Private bucket policy applied"
    }

    main() {
      log "Starting MinIO bootstrap job"
      wait_for_minio
      create_bucket
      apply_bucket_policy
      log "MinIO bootstrap completed successfully"
    }

    main "$@"