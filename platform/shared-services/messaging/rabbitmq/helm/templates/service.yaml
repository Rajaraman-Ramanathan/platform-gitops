apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
spec:
  type: {{ .Values.service.type }}
  clusterIP: None
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: {{ .Values.service.port }}
      targetPort: 5672
    - name: management
      port: {{ .Values.service.managementPort }}
      targetPort: 15672
{{- if .Values.metrics.enabled }}
    - name: metrics
      port: 15692
      targetPort: 15692
{{- end }}