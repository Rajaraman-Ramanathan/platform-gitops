{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rabbitmq
  namespace: rabbitmq
spec:
  selector:
    matchLabels:
      app: rabbitmq

  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics

  namespaceSelector:
    matchNames:
      - rabbitmq
{{- end }}