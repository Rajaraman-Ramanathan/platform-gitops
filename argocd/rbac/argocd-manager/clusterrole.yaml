apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-manager-role
rules:
- apiGroups: ["", "apps", "batch", "extensions"]
  resources:
    - pods
    - services
    - deployments
    - replicasets
    - jobs
    - configmaps
    - secrets
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
  verbs: ["*"]