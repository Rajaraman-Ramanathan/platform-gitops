apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  source:
    repoURL: https://github.com/Rajaraman-Ramanathan/microbank-gitops.git
    targetRevision: dev
    path: platform/shared-infra/messaging/rabbitmq/helm
    helm:
      releaseName: rabbitmq
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://microbank-dev-control-plane:6443
    namespace: rabbitmq
  syncPolicy:
    automated:
      prune: true
      selfHeal: true