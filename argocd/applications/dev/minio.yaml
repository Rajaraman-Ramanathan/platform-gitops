apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  sources:
  - repoURL: https://github.com/Rajaraman-Ramanathan/platform-gitops.git
    targetRevision: dev
    path: platform/shared-infra/storage/minio/helm
    helm:
      releaseName: minio
      valueFiles:
        - $values/environments/dev/storage/minio/values.yaml
  - repoURL: https://github.com/Rajaraman-Ramanathan/platform-gitops.git
    targetRevision: dev
    ref: values
  destination:
    server: https://microbank-dev-control-plane:6443
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true