apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: platform
  source:
    repoURL: https://github.com/Rajaraman-Ramanathan/microbank-gitops.git
    targetRevision: dev
    path: environments/dev/bootstrap/minio
  destination:
    server: https://microbank-dev-control-plane:6443
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true