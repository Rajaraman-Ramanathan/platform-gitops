apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: platform
  source:
    repoURL: https://github.com/Rajaraman-Ramanathan/platform-gitops.git
    targetRevision: dev
    path: environments/dev/storage/minio/bootstrap
  destination:
    name: microbank-dev-cluster
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true