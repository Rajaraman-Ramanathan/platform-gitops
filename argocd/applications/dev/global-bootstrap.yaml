apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: global-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://github.com/Rajaraman-Ramanathan/platform-gitops.git
    targetRevision: dev
    path: platform/bootstrap
  destination:
    name: microbank-dev-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true