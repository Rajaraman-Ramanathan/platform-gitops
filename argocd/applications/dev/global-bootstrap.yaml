apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: global-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://github.com/Rajaraman-Ramanathan/microbank-gitops.git
    targetRevision: dev
    path: platform/bootstrap
  destination:
    server: https://microbank-dev-control-plane:6443
  syncPolicy:
    automated:
      prune: true
      selfHeal: true