apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: platform
  source:
    repoURL: https://github.com/Rajaraman-Ramanathan/microbank-gitops.git
    targetRevision: dev
    path: platform/shared-infra/keycloak/helm
    helm:
      releaseName: keycloak
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://microbank-dev-control-plane:6443
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true