apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: platform
  source:
    repoURL: https://github.com/Rajaraman-Ramanathan/platform-gitops.git
    targetRevision: dev
    path: environments/dev/database/postgres/bootstrap
  destination:
    server: https://microbank-dev-control-plane:6443
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true